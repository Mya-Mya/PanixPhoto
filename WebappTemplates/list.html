<html lang="ja" prefix="og: http://ogp.me/ns#">
<style>
    @import url("https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css");

    :root {
        --n-columns: 2;
    }

    @media (min-width: 900px) {
        :root {
            --n-columns: 3;
        }
    }

    @media (min-width: 1200px) {
        :root {
            --n-columns: 4;
        }
    }

    #media-list {
        display: grid;
        grid-template-columns: repeat(var(--n-columns), 1fr);
        gap: var(--pico-border-radius);
        border-radius: var(--pico-border-radius);
    }

    img, video {
        aspect-ratio: 1/1;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="{{ current_directory }}">
    <meta property="og:type" content="article">
    <meta property="og:description" content="">
    <meta property="og:url" content="">
    <meta property="og:site_name" content="PanixPhoto">
    <meta property="og:image" content="">
    <title>{{ current_directory or 'PanixPhoto' }}</title>
</head>

<body>
    <main>
        {% if directory_items %}
        <section>
            <h2>フォルダ</h2>

            <ul>
                {% for item in directory_items %}
                <li><a href="/app/{{ (dir_path + '/' if dir_path else '') + item.name }}">{{ item.name }}</a></li>
                {% endfor %}
            </ul>

        </section>
        {% endif %}
        {% if media_items %}
        <section>
            <h2>メディア</h2>
            <div id="media-list">
                {% for item in media_items %}
                {% set full_media_path = (dir_path + '/' if dir_path else '') + item.filename %}
                <figure>
                    <a href="/api/media/{{ full_media_path }}">
                        {% if item.type=='Video' %}
                        <video src="/api/media/{{ full_media_path }}"></video>
                        {% endif %}
                        {% if item.type=='Image' %}
                        <img src="/api/media/{{ full_media_path }}" alt="{{ item.filename }}" loading="lazy">
                        {% endif %}
                    </a>
                </figure>
                {% endfor %}
            </div>
        </section>
        {% endif %}
    </main>
</body>

</html>
